<!DOCTYPE html>

<html lang="en" xmlns="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="utf-8" />
    <title></title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: sans-serif;
            background-color: #151D2A;
        }

        header {
            background-color: #212936;
            text-align: start;
        }

            header h1 {
                color: #FFFFFF;
                padding: 5px;
                font-size: 2rem;
            }

        .panel {
            padding-top: 10px;
        }

        .panel h1 {
            text-align: center;
            font-size: 1.6rem;
            padding: 10px;
            color: #FFFFFF;
        }

        .espacios {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            text-align: center;
            margin: 10px;
            color: #FFFFFF;
            gap: 10px;
        }

            .espacios label:first-of-type {
                background-color: #234930;
                border: 2px solid #548C6C;
                border-radius: 3px;
                width: 100%;
                font-size: 1.1rem;
                padding-top: 10px;
                padding-bottom: 10px;
            }

            .espacios label:last-of-type {
                background-color: #592327;
                border: 2px solid #925253;
                border-radius: 3px;
                width: 100%;
                font-size: 1.1rem;
                padding-top: 10px;
                padding-bottom: 10px;
            }

        .estacionamiento {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            text-align: center;
            margin: 10px;
            margin-top: 25px;
            color: #FFFFFF;
            gap: 10px;
        }

        .plazaLibre {
            background-color: #222A37;
            border: 2px solid #FFFFFF;
            border-radius: 3px;
            width: 100%;
            height: 160px;
            font-size: 1.1rem;
            display: grid;
            grid-template-rows: repeat(1, 1fr);
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .plazaOcupada {
            background-color: #5A2127;
            border: 2px solid #DE6F7A;
            border-radius: 3px;
            width: 100%;
            height: 160px;
            font-size: 1.1rem;
            display: grid;
            grid-template-rows: repeat(1, 1fr);
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .plazaTuLugar {
            background-color: #5A3715;
            border: 2px solid #DE9A58;
            border-radius: 3px;
            width: 100%;
            height: 160px;
            font-size: 1.1rem;
            display: grid;
            grid-template-rows: repeat(1, 1fr);
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .numeroPlaza {
            font-size: 2.4rem;
            font-weight: bold;
        }

        .estadoPlaza {
            font-size: 1.5rem;
        }

    </style>
</head>
<body>
    <header>
        <h1>Reservacion de estacionamiento</h1>
    </header>
    <section class="panel">
        <h1>Seleccione su lugar de estacionamiento</h1>
        <div class="espacios">
            <label>LUGARES DISPONIBLES: 10</label>
            <label>LUGARES OCUPADOS: 0</label>
        </div>
        <section class="estacionamiento">
            <div class="plazaLibre">
                <label class="numeroPlaza">1</label>
                <label class="estadoPlaza">Libre</label>
            </div>
            <div class="plazaOcupada">
                <label class="numeroPlaza">2</label>
                <label class="estadoPlaza">Ocupada</label>
            </div>
            <div class="plazaLibre">
                <label class="numeroPlaza">3</label>
                <label class="estadoPlaza">Libre</label>
            </div>
            <div class="plazaTuLugar">
                <label class="numeroPlaza">5</label>
                <label class="estadoPlaza">Tu lugar</label>
            </div>
            <div class="plazaLibre">
                <label class="numeroPlaza">4</label>
                <label class="estadoPlaza">Libre</label>
            </div>
            <div class="plazaLibre">
                <label class="numeroPlaza">6</label>
                <label class="estadoPlaza">Libre</label>
            </div>
            <div class="plazaLibre">
                <label class="numeroPlaza">7</label>
                <label class="estadoPlaza">Libre</label>
            </div>
            <div class="plazaLibre">
                <label class="numeroPlaza">8</label>
                <label class="estadoPlaza">Libre</label>
            </div>
            <div class="plazaLibre">
                <label class="numeroPlaza">9</label>
                <label class="estadoPlaza">Libre</label>
            </div>
            <div class="plazaLibre">
                <label class="numeroPlaza">10</label>
                <label class="estadoPlaza">Libre</label>
            </div>
        </section>
    </section>
</body>
</html>
