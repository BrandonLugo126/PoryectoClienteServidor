<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <title>Estacionamiento - Long Polling</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: sans-serif;
            background-color: #151D2A;
        }

        header {
            background-color: #212936;
            text-align: start;
        }

            header h1 {
                color: #FFFFFF;
                padding: 5px;
                font-size: 2rem;
            }

        .panel {
            padding-top: 10px;
        }

            .panel h1 {
                text-align: center;
                font-size: 1.6rem;
                padding: 10px;
                color: #FFFFFF;
            }

        .espacios {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            text-align: center;
            margin: 10px;
            color: #FFFFFF;
            gap: 10px;
        }

            .espacios label:first-of-type {
                background-color: #234930;
                border: 2px solid #548C6C;
                border-radius: 3px;
                width: 100%;
                font-size: 1.1rem;
                padding: 10px;
            }

            .espacios label:last-of-type {
                background-color: #592327;
                border: 2px solid #925253;
                border-radius: 3px;
                width: 100%;
                font-size: 1.1rem;
                padding: 10px;
            }

        .estacionamiento {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            text-align: center;
            margin: 10px;
            margin-top: 25px;
            color: #FFFFFF;
            gap: 10px;
        }

        .plazaLibre {
            background-color: #222A37;
            border: 2px solid #FFFFFF;
            border-radius: 3px;
            width: 100%;
            height: 160px;
            font-size: 1.1rem;
            display: flex;
            flex-direction: column;
            justify-content: center;
            cursor: pointer;
        }

        .plazaOcupada {
            background-color: #5A2127;
            border: 2px solid #DE6F7A;
            border-radius: 3px;
            width: 100%;
            height: 160px;
            font-size: 1.1rem;
            display: flex;
            flex-direction: column;
            justify-content: center;
            cursor: not-allowed;
        }

        .plazaTuLugar {
            background-color: #5A3715;
            border: 2px solid #DE9A58;
            border-radius: 3px;
            width: 100%;
            height: 160px;
            font-size: 1.1rem;
            display: flex;
            flex-direction: column;
            justify-content: center;
            cursor: pointer;
        }

        .numeroPlaza {
            font-size: 2.4rem;
            font-weight: bold;
        }

        .estadoPlaza {
            font-size: 1.5rem;
        }
    </style>
</head>
<body>
    <header>
        <h1>Reservación de estacionamiento</h1>
    </header>
    <section class="panel">
        <h1>Seleccione su lugar de estacionamiento</h1>
        <div class="espacios">
            <label id="LugaresLibres">LUGARES DISPONIBLES: 0</label>
            <label id="LugaresOcupados">LUGARES OCUPADOS: 0</label>
        </div>
        <section class="estacionamiento" id="contenedorPlazas"></section>
    </section>

    <script>
        const url = "http://localhost:5100/Estacionamiento/";

        let uid = localStorage.getItem("estacionamiento_uid");
        if (!uid) {
            uid = crypto.randomUUID ? crypto.randomUUID() : Math.random().toString(36).substring(2);
            localStorage.setItem("estacionamiento_uid", uid);
        }

        let pollingActive = true;

        const contenedor = document.getElementById("contenedorPlazas");
        const lblLibres = document.getElementById("LugaresLibres");
        const lblOcupados = document.getElementById("LugaresOcupados");

        let plazas = [];

        function generarPlazas() {
            while (contenedor.firstChild) {
                contenedor.removeChild(contenedor.firstChild);
            }
            plazas = [];
            for (let i = 1; i <= 10; i++) {
                const div = document.createElement("div");
                div.className = "plazaLibre";
                div.setAttribute("data-num", i);

                const labelNumero = document.createElement("label");
                labelNumero.className = "numeroPlaza";
                labelNumero.textContent = i.toString();

                const labelEstado = document.createElement("label");
                labelEstado.className = "estadoPlaza";
                labelEstado.textContent = "Libre";

                div.appendChild(labelNumero);
                div.appendChild(labelEstado);

                contenedor.appendChild(div);

                plazas.push({
                    div: div,
                    labelEstado: labelEstado
                });
            }
        }
        generarPlazas();

        function actualizarUI(estado) {
            lblLibres.textContent = `LUGARES DISPONIBLES: ${estado.Libres}`;
            lblOcupados.textContent = `LUGARES OCUPADOS: ${estado.Ocupados}`;

            for (let i = 0; i < plazas.length; i++) {
                const plaza = plazas[i];
                const estadoPlaza = estado.Lugares[i]; // "libre", "ocupado", "tuyo"
                const labelEstado = plaza.labelEstado;

                plaza.div.classList.remove("plazaLibre", "plazaOcupada", "plazaTuLugar");

                if (estadoPlaza === "libre") {
                    plaza.div.classList.add("plazaLibre");
                    labelEstado.textContent = "Libre";
                } else if (estadoPlaza === "ocupado") {
                    plaza.div.classList.add("plazaOcupada");
                    labelEstado.textContent = "Ocupado";
                } else if (estadoPlaza === "tuyo") {
                    plaza.div.classList.add("plazaTuLugar");
                    labelEstado.textContent = "Tu lugar";
                }
            }
        }

        async function obtenerEstado() {

            const resp = await fetch(`${url}Estado?uid=${encodeURIComponent(uid)}`);
            if (resp.ok) {
                const data = await resp.json();
                actualizarUI(data);
            } 

        }

        async function apartar(posicion) {

            const resp = await fetch(`${url}Apartar`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ Uid: uid, PosicionDeEstacionamiento: posicion })
            });
            if (resp.ok) {
                const data = await resp.json();
                actualizarUI(data);
            } else if (resp.status === 409) {
                alert("Esta plaza ya está ocupada por otro usuario");
                await obtenerEstado();
            } else {
                alert("Error al apartar la plaza");
            }

        }

        async function desocupar(posicion) {

            const resp = await fetch(`${url}Desocupar`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ Uid: uid, PosicionDeEstacionamiento: posicion })
            });
            if (resp.ok) {
                const data = await resp.json();
                actualizarUI(data);
            } else if (resp.status === 404) {
                alert("No puedes desocupar una plaza que no te pertenece");
                await obtenerEstado();
            } else {
                alert("Error al desocupar");
            }

        }

        async function esperarCambios() {
            while (pollingActive) {

                const resp = await fetch(`${url}EsperarCambio?uid=${encodeURIComponent(uid)}`);
                if (resp.ok) {
                    const data = await resp.json();
                    actualizarUI(data);
                } else {
                    await new Promise(r => setTimeout(r, 2000));
                }

            }
        }

        contenedor.addEventListener("click", async (e) => {
            const plazaDiv = e.target.closest("[data-num]");
            if (!plazaDiv) return;

            const num = parseInt(plazaDiv.getAttribute("data-num"));
            const esLibre = plazaDiv.classList.contains("plazaLibre");
            const esTuLugar = plazaDiv.classList.contains("plazaTuLugar");

            if (esLibre) {
                await apartar(num);
            } else if (esTuLugar) {
                if (confirm(`¿Liberar tu plaza número ${num}?`)) {
                    await desocupar(num);
                }
            } else {
                alert("Esta plaza está ocupada por otro usuario");
            }
        });

        obtenerEstado().then(() => {
            esperarCambios();
        });
    </script>
</body>
</html>
